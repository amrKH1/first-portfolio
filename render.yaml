services:
  - type: web
    name: portfolio-backend
    env: node
    plan: free
    rootDir: portfolio-backend
    buildCommand: npm install
    startCommand: node src/server.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://cool-llama-abdb20.netlify.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: amrkhaaled.eng12@gmail.com
      - key: SMTP_PASS
        fromSecret: GMAIL_APP_PASSWORD
      # Optional: set a real MongoDB Atlas URI; if omitted, email still sends and DB writes are skipped safely
      # - key: MONGODB_URI
      #   value: YOUR_ATLAS_CONNECTION_STRING

